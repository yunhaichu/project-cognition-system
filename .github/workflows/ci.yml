name: CI

on:
  push:
  pull_request:

jobs:
  governance:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python scripts
        run: python -m py_compile .project_cognition/scripts/*.py integrations/codex/*.py integrations/hermes/*.py integrations/hermes/gateway_hook/project_cognition/*.py evals/*.py scripts/*.py

      - name: Validate bundled cognition state
        run: python .project_cognition/scripts/validate_state.py

      - name: Build read-only evidence index
        run: python .project_cognition/scripts/index_segments.py

      - name: Cluster duplicate candidates
        run: python .project_cognition/scripts/cluster_candidates.py

      - name: Cluster unresolved conflicts
        run: python .project_cognition/scripts/cluster_conflicts.py

      - name: Build governance gate
        run: python .project_cognition/scripts/auto_governance_gate.py

      - name: Check drift budgets
        run: python .project_cognition/scripts/drift_report.py

      - name: Report feedback metrics
        run: python .project_cognition/scripts/feedback_report.py

      - name: Run governance evals
        run: python evals/run_minimal_eval.py

      - name: Run feedback evals
        run: python evals/run_feedback_eval.py

      - name: Run scoring weight evals
        run: python evals/run_scoring_weight_eval.py

      - name: Build sanitized release package
        run: python scripts/build_package.py --version ci --output-dir /tmp/project-cognition-package

      - name: Check whitespace
        run: git diff --check
